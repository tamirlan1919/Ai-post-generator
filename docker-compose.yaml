services:
  postgres:
    image: postgres:16-alpine
    container_name: aibot-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: aibot
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pass}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5435:5432"
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d aibot']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - aibot-net


  redis:
    image: redis:7-alpine
    container_name: aibot-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - aibot-net

  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: aibot-rabbit
    restart: unless-stopped
    ports:
      - '5672:5672'
      - '15672:15672'
    healthcheck:
      test: ['CMD', 'rabbitmq-diagnostics', '-q', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - aibot-net

  api:
    build:
      context: .
    container_name: aibot-api
    restart: unless-stopped
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - '8000:8000'
    env_file:
      - .env
    volumes:
      - .:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - aibot-net

  celery_worker:
    build:
      context: .
    container_name: aibot-celery-worker
    restart: unless-stopped
    command: celery -A celery_worker worker --loglevel=info
    env_file:
      - .env
    volumes:
      - .:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - aibot-net

  celery_beat:
    build:
      context: .
    container_name: aibot-celery-beat
    restart: unless-stopped
    command: celery -A celery_worker beat --loglevel=info
    env_file:
      - .env
    volumes:
      - .:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - aibot-net

  flower:
    build:
      context: .
    container_name: aibot-flower
    restart: unless-stopped
    command: celery -A celery_worker flower --port=5555
    env_file:
      - .env
    ports:
      - '5555:5555'
    depends_on:
      - celery_worker
    networks:
      - aibot-net


networks:
  aibot-net:


volumes:
  postgres_data:
